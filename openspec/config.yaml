schema: spec-driven

context: |
  Game Jam 2026 project - Dungeon Lord Startup (魔王創業)
  Tech stack: Phaser 3 + JavaScript/TypeScript (game engine), HTML5 Canvas
  Platform: Mobile web (Portrait orientation, 375x812px target)
  Single-page application, no backend. State persisted in localStorage.
  Art assets generated by nano banana (Gemini Imagen) - pixel art style
  Solo developer using Claude Code
  Development timeline: 2 weeks
  Domain: Roguelike dungeon management game with meta-progression
  Reference: Dungeon Maker (mobile), Pikmin Bloom (planter UI)

parallel_tasks: true
audit: false
tdd: false

rules:
  proposal:
    - Keep proposals concise and focused on the "why"
    - Always include affected files and risk assessment
    - Reference the design spec for visual/mechanic decisions
  tasks:
    - Break tasks into chunks that can be completed in 1-2 hours
    - Each task must have clear verification criteria (visual or functional)
    - Prioritize playable core loop over polish
    - "Use [SKIP-TDD: reason] for all tasks — no test infrastructure in Game Jam scope"
  specs:
    - Reference design doc (docs/superpowers/specs/2026-04-01-dungeon-lord-startup-design.md)
    - All game data (monsters, heroes, rooms, traps) must be data-driven (JSON config)
    - "New spec files must include YAML frontmatter: baseline_date (ISO 8601), last_modified (ISO 8601), version (MAJOR.MINOR starting at 1.0)"
